<!DOCTYPE html>
<html lang="en">
<head>

<title>Commercial Awareness Digest — Elite Pathfinder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
  :root{
    --black:#111111; --text:#1a1a1a; --mid:#555555; --muted:#888888; --light:#b0b0b0;
    --line:rgba(0,0,0,0.08); --hover:rgba(0,0,0,0.03); --grey-bg:#f6f6f6;
    --ease:cubic-bezier(.25,.1,.25,1);
    --sans:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --serif:'Playfair Display',Georgia,serif;
  }
  #en-app *{box-sizing:border-box;}
  #en-app{font-family:var(--sans);font-feature-settings:"kern" 1,"liga" 1;-webkit-font-smoothing:antialiased;
    color:var(--text);width:100%;max-width:100%;margin:0;padding:0;line-height:1.6;}

  /* ===== HERO ===== */
  .en-hero{background:var(--black);padding:clamp(40px,6vw,64px) clamp(24px,6vw,56px) clamp(34px,5vw,52px);overflow:hidden;}
  .en-hero-inner{max-width:760px;}
  .en-eyebrow{font-size:11px;letter-spacing:.24em;text-transform:uppercase;font-weight:600;
    color:rgba(255,255,255,.45);margin-bottom:16px;opacity:0;animation:rise .7s var(--ease) .05s forwards;}
  .en-hero-title{margin:0 0 14px;font-family:var(--serif);font-size:clamp(30px,5vw,50px);line-height:1.05;
    font-weight:700;letter-spacing:-.02em;color:#fff;opacity:0;animation:rise .7s var(--ease) .12s forwards;}
  .en-hero-sub{margin:0 0 34px;font-size:clamp(14px,2.2vw,16px);color:rgba(255,255,255,.5);max-width:560px;
    opacity:0;animation:rise .7s var(--ease) .2s forwards;}
  @keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  .en-toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    opacity:0;animation:rise .7s var(--ease) .28s forwards;}
  .en-select-wrap{position:relative;min-width:180px;}
  .en-select-wrap.wk{flex:1;min-width:220px;max-width:340px;}
  .en-chev{position:absolute;right:13px;top:50%;transform:translateY(-50%);width:13px;height:13px;
    color:rgba(255,255,255,.35);pointer-events:none;}
  select.en-sel{appearance:none;-webkit-appearance:none;width:100%;font-family:inherit;font-size:14px;font-weight:500;
    color:#fff;padding:11px 34px 11px 15px;border-radius:7px;border:1px solid rgba(255,255,255,.13);
    background:rgba(255,255,255,.06);outline:none;cursor:pointer;transition:border-color .2s var(--ease);}
  select.en-sel option{background:#1a1a1a;color:#fff;}
  select.en-sel:hover{border-color:rgba(255,255,255,.28);}
  .en-nav-btns{display:flex;gap:5px;}
  .en-nav-btn{width:42px;height:42px;border-radius:7px;border:1px solid rgba(255,255,255,.13);background:transparent;
    color:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
    transition:color .2s var(--ease),border-color .2s var(--ease);}
  .en-nav-btn svg{width:15px;height:15px;}
  .en-nav-btn:hover:not(:disabled){color:#fff;border-color:rgba(255,255,255,.32);}
  .en-nav-btn:disabled{opacity:.22;cursor:not-allowed;}
  .en-status{margin-top:16px;font-size:13px;color:rgba(255,255,255,.35);min-height:18px;letter-spacing:.02em;}

  /* ===== TOC ===== */
  .en-wrap{max-width:880px;margin:0 auto;padding:0 clamp(24px,6vw,56px);}
  .en-toc{margin:clamp(34px,5vw,48px) auto;}
  .en-toc-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;}
  .en-toc-list{margin:0;padding:0;list-style:none;counter-reset:toc;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
  .en-toc-list li{counter-increment:toc;}
  .en-toc-link{display:flex;align-items:flex-start;gap:13px;padding:15px 17px;text-decoration:none;color:var(--text);
    border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:background .2s var(--ease),border-color .2s var(--ease),transform .2s var(--ease);}
  .en-toc-link:hover{background:var(--hover);border-color:rgba(0,0,0,.16);transform:translateY(-1px);}
  .en-toc-link::before{content:counter(toc,decimal-leading-zero);font-size:12px;font-weight:700;color:var(--light);
    flex-shrink:0;min-width:20px;line-height:1.45;}
  .en-toc-title{font-size:13.5px;font-weight:600;line-height:1.45;display:block;}
  .en-toc-meta{font-size:11.5px;color:var(--muted);font-weight:400;display:block;margin-top:4px;}

  /* ===== CARDS (single column accordion) ===== */
  .en-list{display:flex;flex-direction:column;padding-bottom:20px;}
  .en-card{border-bottom:1px solid var(--line);overflow:hidden;opacity:0;transform:translateY(12px);
    transition:opacity .5s var(--ease),transform .5s var(--ease);}
  .en-card:first-child{border-top:1px solid var(--line);}
  .en-card.en-visible{opacity:1;transform:none;}
  .en-card-header{padding:clamp(24px,3vw,32px) 0;cursor:pointer;display:flex;justify-content:space-between;
    align-items:flex-start;gap:22px;user-select:none;}
  .en-ch-left{flex:1;min-width:0;}
  .en-tags{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-bottom:11px;}
  .en-tag{font-size:10px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;color:var(--mid);
    background:var(--grey-bg);padding:3px 9px;border-radius:5px;}
  .en-tag.region{background:var(--black);color:#fff;}
  .en-title{margin:0 0 11px;font-family:var(--serif);font-size:clamp(19px,2.2vw,24px);line-height:1.25;
    letter-spacing:-.01em;font-weight:600;color:var(--text);transition:color .2s var(--ease);}
  .en-card-header:hover .en-title{color:var(--mid);}
  .en-meta{font-size:12.5px;color:var(--muted);display:flex;flex-wrap:wrap;align-items:center;gap:7px;}
  .en-meta-sep{color:var(--light);}
  .en-meta-pub{font-weight:600;color:var(--mid);text-transform:uppercase;letter-spacing:.04em;font-size:11.5px;}
  .en-src-link{display:inline-flex;align-items:center;gap:4px;color:var(--mid);font-size:11.5px;font-weight:600;
    text-decoration:none;padding:2px 9px;border-radius:5px;border:1px solid var(--line);transition:color .2s,border-color .2s;}
  .en-src-link:hover{color:var(--text);border-color:rgba(0,0,0,.22);}
  .en-toggle{width:30px;height:30px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;
    background:transparent;border:none;cursor:pointer;}
  .en-toggle svg{width:17px;height:17px;color:var(--light);transition:color .25s var(--ease),transform .35s var(--ease);}
  .en-card-header:hover .en-toggle svg{color:var(--mid);}
  .en-card.is-open .en-toggle svg{color:var(--text);transform:rotate(180deg);}

  .en-body-outer{max-height:0;overflow:hidden;transition:max-height .45s var(--ease);}
  .en-card.is-open .en-body-outer{max-height:9000px;transition:max-height .7s var(--ease);}
  .en-body-inner{padding:4px 0 clamp(30px,4vw,42px);max-width:680px;}

  .en-section{margin-bottom:28px;}
  .en-section:last-child{margin-bottom:0;}
  .en-sec-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .en-prose{font-size:16px;line-height:1.8;color:#333;}
  /* explainer = quiet study-note box */
  .en-means{background:var(--grey-bg);border-radius:12px;padding:18px 20px;}
  .en-means .en-sec-label{margin-bottom:9px;}
  .en-means .en-prose{font-size:15px;line-height:1.75;color:#444;}
  .en-bullets{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:11px;}
  .en-bullet{display:flex;align-items:flex-start;gap:12px;font-size:15px;line-height:1.7;color:#333;}
  .en-bullet .dot{width:5px;height:5px;border-radius:50%;background:var(--light);flex-shrink:0;margin-top:10px;}
  .en-section.firms .en-bullet .dot{background:var(--black);}
  .en-bullet strong,.en-prose strong{color:var(--text);font-weight:600;}

  .en-read{margin-top:30px;padding-top:18px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:9px 18px;align-items:center;}
  .en-read-label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;font-weight:600;color:var(--light);}
  .en-read-link{display:inline-flex;align-items:center;gap:6px;color:var(--mid);font-size:13px;font-weight:600;
    text-decoration:none;border-bottom:1px solid var(--line);padding-bottom:1px;transition:color .2s,border-color .2s;}
  .en-read-link:hover{color:var(--text);border-color:var(--text);}
  .en-read-link svg{width:13px;height:13px;transition:transform .2s var(--ease);}
  .en-read-link:hover svg{transform:translateX(3px);}

  .en-empty,.en-error{padding:48px 0;color:var(--muted);font-size:15px;}
  .en-skel{padding:30px 0;border-bottom:1px solid var(--line);}
  .en-skel:first-child{border-top:1px solid var(--line);}
  .en-skel-line{border-radius:4px;background:rgba(0,0,0,.05);margin-bottom:12px;animation:pulse 1.7s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  .en-footer{border-top:1px solid var(--line);margin-top:30px;padding:30px 0 60px;text-align:center;color:var(--light);font-size:12px;}
  .en-footer .sig{font-family:var(--serif);color:var(--mid);font-size:15px;margin-bottom:6px;}

  @media (prefers-reduced-motion:reduce){
    #en-app *{animation:none!important;transition:none!important}
    .en-card{opacity:1;transform:none}
    .en-eyebrow,.en-hero-title,.en-hero-sub,.en-toolbar{opacity:1}
  }
  @media (max-width:700px){
    .en-toc-list{grid-template-columns:1fr;}
    .en-prose{font-size:15px;}
    .en-select-wrap{min-width:0;flex:1;}
  }
</style>
</head>

  <header class="en-hero">
    <div class="en-hero-inner">
